<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高性能虚拟滚动列表演示</title>
  <script src="./virtual-list.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      border: 2px solid #4a90d9;
      background: white;
      color: #4a90d9;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #4a90d9;
      color: white;
    }

    .tab-btn:hover:not(.active) {
      background: #e8f4fd;
    }

    .demo-section {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    .demo-section.active {
      display: block;
    }

    .info-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      padding: 12px;
      background: #f0f7ff;
      border-radius: 8px;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-label {
      color: #666;
    }

    .info-value {
      color: #4a90d9;
      font-weight: 600;
    }

    .list-container {
      height: 500px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .list-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      background: white;
      transition: background 0.2s;
    }

    .list-item:hover {
      background: #f9f9f9;
    }

    .item-title {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 13px;
      color: #888;
    }

    .item-index {
      display: inline-block;
      background: #4a90d9;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 8px;
    }

    .dynamic-height .item-desc {
      display: block;
    }

    .group-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
    }

    .sticky-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
    }

    .loading-indicator {
      text-align: center;
      padding: 16px;
      color: #888;
      font-size: 14px;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .control-btn {
      padding: 8px 16px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .control-btn:hover {
      background: #3a7bc8;
    }

    .control-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .scroll-input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      width: 120px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 16px;
      flex-shrink: 0;
    }

    .item-with-avatar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-content {
      flex: 1;
      min-width: 0;
    }

    .item-content .item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 高性能虚拟滚动列表</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="fixed">固定行高 (10万条)</button>
      <button class="tab-btn" data-tab="dynamic">动态行高</button>
      <button class="tab-btn" data-tab="grouped">分组展示 + 吸顶</button>
      <button class="tab-btn" data-tab="infinite">无限滚动加载</button>
    </div>

    <div id="fixed" class="demo-section active">
      <div class="info-bar">
        <div class="info-item">
          <span class="info-label">总数据量:</span>
          <span class="info-value" id="fixed-count">0</span> 条
        </div>
        <div class="info-item">
          <span class="info-label">实际渲染:</span>
          <span class="info-value" id="fixed-rendered">0</span> 个 DOM
        </div>
        <div class="info-item">
          <span class="info-label">行高:</span>
          <span class="info-value">固定 60px</span>
        </div>
      </div>
      <div class="list-container" id="fixed-list"></div>
      <div class="controls">
        <input type="number" class="scroll-input" id="fixed-scroll-input" placeholder="输入索引" min="0">
        <button class="control-btn" onclick="scrollToFixedIndex()">滚动到索引</button>
        <button class="control-btn" onclick="refreshFixedList()">刷新列表</button>
      </div>
    </div>

    <div id="dynamic" class="demo-section">
      <div class="info-bar">
        <div class="info-item">
          <span class="info-label">总数据量:</span>
          <span class="info-value" id="dynamic-count">0</span> 条
        </div>
        <div class="info-item">
          <span class="info-label">实际渲染:</span>
          <span class="info-value" id="dynamic-rendered">0</span> 个 DOM
        </div>
        <div class="info-item">
          <span class="info-label">行高:</span>
          <span class="info-value">动态 (ResizeObserver)</span>
        </div>
      </div>
      <div class="list-container dynamic-height" id="dynamic-list"></div>
    </div>

    <div id="grouped" class="demo-section">
      <div class="info-bar">
        <div class="info-item">
          <span class="info-label">分组数:</span>
          <span class="info-value" id="grouped-groups">0</span> 组
        </div>
        <div class="info-item">
          <span class="info-label">总数据量:</span>
          <span class="info-value" id="grouped-count">0</span> 条
        </div>
        <div class="info-item">
          <span class="info-label">当前分组:</span>
          <span class="info-value" id="grouped-current">-</span>
        </div>
      </div>
      <div class="list-container" id="grouped-list"></div>
    </div>

    <div id="infinite" class="demo-section">
      <div class="info-bar">
        <div class="info-item">
          <span class="info-label">已加载:</span>
          <span class="info-value" id="infinite-count">0</span> 条
        </div>
        <div class="info-item">
          <span class="info-label">加载状态:</span>
          <span class="info-value" id="infinite-status">就绪</span>
        </div>
        <div class="info-item">
          <span class="info-label">触发阈值:</span>
          <span class="info-value">200px</span>
        </div>
      </div>
      <div class="list-container" id="infinite-list"></div>
    </div>
  </div>

  <script>
    let fixedList, dynamicList, groupedList, infiniteList;
    let infinitePage = 0;
    const PAGE_SIZE = 100;
    const MAX_PAGES = 100;

    function generateData(count, startIndex = 0) {
      const data = [];
      for (let i = 0; i < count; i++) {
        const idx = startIndex + i;
        data.push({
          id: idx,
          title: `项目 ${idx + 1}`,
          desc: `这是第 ${idx + 1} 条数据的描述信息，用于展示虚拟滚动的效果。`,
          avatar: String.fromCharCode(65 + (idx % 26))
        });
      }
      return data;
    }

    function generateGroupedData(groupCount, itemsPerGroup) {
      const data = [];
      for (let g = 0; g < groupCount; g++) {
        const group = {
          group: `第 ${g + 1} 组`,
          items: []
        };
        for (let i = 0; i < itemsPerGroup; i++) {
          group.items.push({
            id: g * itemsPerGroup + i,
            title: `项目 ${g * itemsPerGroup + i + 1}`,
            desc: `属于第 ${g + 1} 组的第 ${i + 1} 个项目`
          });
        }
        data.push(group);
      }
      return data;
    }

    function generateDynamicData(count) {
      const data = [];
      const descriptions = [
        '简短描述',
        '这是一段中等长度的描述文字，用于展示不同行高的效果。',
        '这是一段非常长的描述文字，用于测试动态行高功能。它包含了更多的内容，会占据更多的垂直空间，展示ResizeObserver如何准确测量每一行的实际高度。',
        '另一段描述',
        '中等长度的描述内容，展示虚拟滚动的灵活性。'
      ];
      for (let i = 0; i < count; i++) {
        data.push({
          id: i,
          title: `项目 ${i + 1}`,
          desc: descriptions[i % descriptions.length]
        });
      }
      return data;
    }

    function renderFixedItem({ item, index }) {
      const div = document.createElement('div');
      div.className = 'list-item item-with-avatar';
      div.innerHTML = `
        <div class="avatar">${item.avatar}</div>
        <div class="item-content">
          <div class="item-title"><span class="item-index">${index}</span>${item.title}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
      `;
      return div;
    }

    function renderDynamicItem({ item, index }) {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `
        <div class="item-title"><span class="item-index">${index}</span>${item.title}</div>
        <div class="item-desc">${item.desc}</div>
      `;
      return div;
    }

    function renderGroupItem({ item, groupIndex, itemIndex, group }) {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = `
        <div class="item-title"><span class="item-index">${groupIndex}-${itemIndex}</span>${item.title}</div>
        <div class="item-desc">${item.desc}</div>
      `;
      return div;
    }

    function renderGroupHeader(group, groupIndex) {
      const div = document.createElement('div');
      div.className = 'group-header';
      div.innerHTML = `📁 ${group} (第 ${groupIndex + 1} 组)`;
      return div;
    }

    function renderStickyHeader(group, groupIndex) {
      const div = document.createElement('div');
      div.className = 'sticky-header';
      div.innerHTML = `📁 ${group} (第 ${groupIndex + 1} 组) - 已置顶`;
      return div;
    }

    function initFixedList() {
      const container = document.getElementById('fixed-list');
      const data = generateData(100000);

      document.getElementById('fixed-count').textContent = data.length.toLocaleString();

      fixedList = new VirtualList(container, {
        itemHeight: 64,
        buffer: 10,
        renderItem: renderFixedItem,
        onScroll: (info) => {
          document.getElementById('fixed-rendered').textContent =
            (info.visibleEndIndex - info.visibleStartIndex).toString();
        }
      });

      fixedList.setData(data);

      const originalRender = fixedList._render.bind(fixedList);
      fixedList._render = function() {
        originalRender();
        document.getElementById('fixed-rendered').textContent =
          (this.visibleEndIndex - this.visibleStartIndex).toString();
      }.bind(fixedList);
    }

    function initDynamicList() {
      const container = document.getElementById('dynamic-list');
      const data = generateDynamicData(10000);

      document.getElementById('dynamic-count').textContent = data.length.toLocaleString();

      dynamicList = new VirtualList(container, {
        estimatedItemHeight: 60,
        buffer: 5,
        renderItem: renderDynamicItem
      });

      dynamicList.setData(data);

      const originalRender = dynamicList._render.bind(dynamicList);
      dynamicList._render = function() {
        originalRender();
        document.getElementById('dynamic-rendered').textContent =
          (this.visibleEndIndex - this.visibleStartIndex).toString();
      }.bind(dynamicList);
    }

    function initGroupedList() {
      const container = document.getElementById('grouped-list');
      const data = generateGroupedData(100, 100);

      document.getElementById('grouped-groups').textContent = data.length.toString();
      document.getElementById('grouped-count').textContent = (data.length * 100).toLocaleString();

      groupedList = new VirtualList(container, {
        itemHeight: 56,
        buffer: 8,
        renderItem: renderGroupItem,
        renderGroupHeader: renderStickyHeader
      });

      groupedList.setData(data);

      const originalUpdateSticky = groupedList._updateStickyHeader.bind(groupedList);
      groupedList._updateStickyHeader = function() {
        originalUpdateSticky();
        const scrollTop = this.scrollTop;
        let currentGroup = '-';
        for (let i = 0; i < this.flatItems.length; i++) {
          if (this.flatItems[i].type === 'header' && this.offsets[i] <= scrollTop) {
            currentGroup = this.flatItems[i].group;
          }
        }
        document.getElementById('grouped-current').textContent = currentGroup;
      }.bind(groupedList);
    }

    function initInfiniteList() {
      const container = document.getElementById('infinite-list');
      infinitePage = 0;

      infiniteList = new VirtualList(container, {
        itemHeight: 64,
        buffer: 10,
        threshold: 200,
        renderItem: function({ item, index }) {
          if (item.isLoading) {
            const div = document.createElement('div');
            div.className = 'loading-indicator';
            div.innerHTML = '<span class="loading-spinner"></span>加载中...';
            return div;
          }
          const div = document.createElement('div');
          div.className = 'list-item item-with-avatar';
          div.innerHTML = `
            <div class="avatar">${item.avatar}</div>
            <div class="item-content">
              <div class="item-title"><span class="item-index">${index}</span>${item.title}</div>
              <div class="item-desc">${item.desc}</div>
            </div>
          `;
          return div;
        },
        onLoadMore: async function() {
          if (infinitePage >= MAX_PAGES) {
            document.getElementById('infinite-status').textContent = '已加载全部';
            return false;
          }

          document.getElementById('infinite-status').textContent = '加载中...';

          await new Promise(resolve => setTimeout(resolve, 800));

          infinitePage++;
          const newData = generateData(PAGE_SIZE, (infinitePage - 1) * PAGE_SIZE);

          if (infinitePage === 1) {
            infiniteList.setData(newData);
          } else {
            infiniteList.appendData(newData);
          }

          document.getElementById('infinite-count').textContent =
            (infinitePage * PAGE_SIZE).toLocaleString();
          document.getElementById('infinite-status').textContent = '就绪';

          if (infinitePage >= MAX_PAGES) {
            document.getElementById('infinite-status').textContent = '已加载全部';
            return false;
          }
          return true;
        }
      });

      infiniteList.options.onLoadMore();
    }

    function scrollToFixedIndex() {
      const input = document.getElementById('fixed-scroll-input');
      const index = parseInt(input.value);
      if (!isNaN(index) && index >= 0) {
        fixedList.scrollToIndex(index, 'smooth');
      }
    }

    function refreshFixedList() {
      fixedList.refresh();
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.demo-section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    window.addEventListener('DOMContentLoaded', () => {
      initFixedList();
      initDynamicList();
      initGroupedList();
      initInfiniteList();
    });
  </script>
</body>
</html>
